<!DOCTYPE html>
<html>

<head>
    <title>Phishing Detector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="box">

        <h1>📧 Phishing Email Detector</h1>

        <form method="POST">

            <textarea
                name="email"
                placeholder="Paste email here..."
                required>
            </textarea>

            <button type="submit">
                Check Email
            </button>

        </form>

        <h2>{{ result }}</h2>

    </div>

</body>

</html>
